<!DOCTYPE html>
<html lang="en">
    <title> Expense tracker app</title>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css" integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css" 
    integrity="sha384-zCbKRCUGaJDkqS1kPbPd7TveP5iyJE0EjAuZQTgFLD2ylzuqKfdKlfG/eSrtxUkn" crossorigin="anonymous">
<head>
    <style>
        body {
            background-image: url('https://cdn.pixabay.com/photo/2017/09/07/08/53/money-2724235_1280.jpg');
            background-size: cover;
            font-family: Arial, sans-serif;
        }
        #myForm {
            background-color: rgba(255, 255, 255, 0.7);
           
            margin: 80px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        .form-control{
            padding:10px;
           width: 100%;
            border-radius:20px;
            margin-bottom:18px;
        }
        .btn{
            background:black;
            color:#fff !important;
            line-height: 10px;
            width: 100%;
        }
        .delete-btn{
            color:white;
            border-radius:20px;
            padding:5px 10px;
            background-color: red;
        }
        .edit-btn{
            color:white;
            border-radius:20px;
            padding:5px 10px;
            background-color: green;
        }
        p{
            font-size: 13px;
        }
        .brdr{
            width:200px;
            border-bottom:2px solid red;
            margin-bottom: 20px;
        }
        #userData1{
            background-color: #fff;
            margin: 80px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        table {
  font-family: arial, sans-serif;
  border-collapse: collapse;
  width: 100%;
}

td, th {
  border: 1px solid #dddddd;
  text-align: left;
  padding: 8px;
}

tr:nth-child(even) {
  background-color: #dddddd;
}
    </style>
</head>
<body>
    <div class="container">
        
      <div class="row">
        
        <div class="col-lg-5">
            <form id="myForm">
                <h4><b>Expense</b> tracker app </h4>
                <div class="brdr"></div>
                <div class="row">
                    <div class="col-lg-12">
                        <label for="name">Name:</label>
                        <input type="text" id="nameInput" class="form-control" name="name" placeholder="Name" required>
            
                    </div>
                    <div class="col-lg-6">
                        <label for="expense">Expense Amount:</label>
                        <input type="number" id="expenseInput" name="expense" class="form-control" placeholder="Expense Amount" required>
            
                    </div>
                    <div class="col-lg-6">
                        <label for="expense">Expense Category:</label>
                       <select  id="expensecatInput" name="expensecat" class="form-control">
                        <option value="Select Option"> Select Option </option>
                        <option value="Movie "> Movie </option>
                        <option value="Select "> Study  </option>
                        <option value="Other "> Other  </option>
                       </select>
                    </div>
                    <div class="col-lg-12">
                        <label for="expense">Expense Description:</label>
                        <textarea id="descInput" name="desc" class="form-control" placeholder="Expense Description" ></textarea>
            
                    </div>
                </div>
               
               
                <button type="submit" class="btn form-control">Submit</button>
            </form>
           
        </div>
        <div class="col-lg-7">
          <div id="userData1">
            <h4><b>Expense</b> tracker app </h4>
            <div class="brdr"></div>
        <div >
            <table>
                <tr>
                <th>Sl No. </th>
                <th> Name</th>
                  <th> Amount</th>
                  <th> Category</th>
                  <th> Description</th>
                  <th> Action</th>
                </tr>
<tbody id="userData"></tbody>
                </table>
            <!-- User data will be displayed here -->
        </div>
          </div>
        </div>
      </div>        
     
    </div>

    <script src="expensetracker.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-fQybjgWLrvvRgtW6bFlB7jaZrFsaBXjsOMm/tB9LTS58ONXgqbR9W8oWht/amnpF" crossorigin="anonymous"></script>

</body>
</html>
