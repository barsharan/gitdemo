<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background-image: url('https://cdn.pixabay.com/photo/2014/04/14/20/11/pink-324175_1280.jpg');
            background-size: cover;
            font-family: Arial, sans-serif;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.7);
            max-width: 430px;
            margin: 80px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        .form-control{
            padding:10px;
           width: 405px;
            border-radius:20px;
            margin-bottom:18px;
        }
        .btn{
            background:green;
            color:#fff;
            width: 430px;
        }
        .delete-btn{
            color:white;
            border-radius:20px;
            padding:10px;
            background-color: red;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Manage Users</h1>
        <form id="myForm">
            <label for="name">Name:</label>
            <input type="text" id="nameInput" class="form-control" name="name" placeholder="Name" required>

            <label for="email">Email:</label>
            <input type="email" id="emailInput" name="email" class="form-control" placeholder="Email" required>

            <button type="submit" class="btn form-control">Submit</button>
        </form>
        <div id="userData">
            <!-- User data will be displayed here -->
        </div>
    </div>

    <script src="deleteuserdata.js"></script>
</body>
</html>
