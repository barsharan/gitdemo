<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My NoteBook</title>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css" integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css" 
    integrity="sha384-zCbKRCUGaJDkqS1kPbPd7TveP5iyJE0EjAuZQTgFLD2ylzuqKfdKlfG/eSrtxUkn" crossorigin="anonymous">

    <style>
        body {
            background-image: url('https://cdn.pixabay.com/photo/2017/12/22/08/01/school-supplies-3033204_1280.jpg');
            background-size: cover;
            font-family: Arial, sans-serif;
        }
        .cont {
            background-color: rgba(255, 255, 255, 0.7);
           
            margin: 80px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        .form-control{
            padding:10px;
           width: 100%;
            border-radius:20px;
            margin-bottom:18px;
        }
        .btn{
            background:green;
            color:#fff;
            padding:6px;
           width: 100%;
            border-radius:20px;
        }
        .brdr{
           
            width: 100%;
            margin-bottom: 10px;
        }
        button {
            background:red;
            color:#fff;
           
            margin-top: -60px;
            font-size: 12px;
            border: none;
            float: right;
            padding:6px;
            border-radius:20px;
}
    </style>
</head>
<body>
   <div class="container">
    <div class="row">
        <div class="col-lg-12">
            <div class="cont">
                <center>
                    <h4>My NoteBook</h4>
                </center>
                <label>Search Notes:</label>
                <input type="text" name="search" class="form-control">
                <h5 id="totalNotesCount">Total Notes: 0</h5>
        <h5 id="showingNotesCount">Notes Showing: 0</h5>



<div class="row">
    <div class="col-lg-6">
        <form id="app" class="cont">
           
            <div>
                <label for="Title">Note Title:</label>
               <input type="text" name="title" class="form-control">
            </div>
            <div>
                <label for="Desc">Note Desc:</label>
               <textarea type="text" name="desc" class="form-control"></textarea>
            </div>
            
    <input type="submit" name="submit" value="add note" class="btn">
    
            </form>
         
    </div>
    <div class="col-lg-6">
        <div class="cont">
            <h2>Note List</h2>
            <div class="brdr"></div>
           
        </div>
    </div>
</div>

            </div>

        </div>
       
       
    </div>
   </div>

    
        
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>


    <script src="mynotebook.js"></script>
</body>
</html>
