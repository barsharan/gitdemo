<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant App</title>
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css" integrity="sha384-lZN37f5QGtY3VHgisS14W3ExzMWZxybE1SJSEsQp9S+oqd12jhcu+A56Ebc1zFSJ" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.1/dist/css/bootstrap.min.css" 
    integrity="sha384-zCbKRCUGaJDkqS1kPbPd7TveP5iyJE0EjAuZQTgFLD2ylzuqKfdKlfG/eSrtxUkn" crossorigin="anonymous">

    <style>
        body {
            background-image: url('https://cdn.pixabay.com/photo/2020/09/21/05/58/coffee-5589038_1280.jpg');
            background-size: cover;
            font-family: Arial, sans-serif;
        }
        .cont {
            background-color: rgba(255, 255, 255, 0.7);
           
            margin: 80px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        .form-control{
            padding:10px;
           width: 100%;
            border-radius:20px;
            margin-bottom:18px;
        }
        .btn{
            background:green;
            color:#fff;
            padding:6px;
           width: 100%;
            border-radius:20px;
        }
        .brdr{
            border-bottom: 2px solid green;
            width: 100px;
            margin-bottom: 10px;
        }
        button {
            background:red;
            color:#fff;
            font-size: 12px;
            border: none;
            float: right;
            padding:6px;
            border-radius:20px;
}
    </style>
</head>
<body>
   <div class="container">
    <div class="row">
        <div class="col-lg-1">

        </div>
        <div class="col-lg-6">
            <form id="app" class="cont">
                <h1>Restaurant App</h1>
                <div>
                    <label for="Price">Choose Price:</label>
                   <input type="text" name="price" class="form-control">
                </div>
                <div>
                    <label for="Dish">Choose Dish:</label>
                   <input type="text" name="dish" class="form-control">
                </div>
                <div>
                    <label for="tableSelect">Choose Table:</label>
                    <select id="tableSelect" class="form-control">
                        <option value="table1">Table 1</option>
                        <option value="table2">Table 2</option>
                    </select>
                </div>
        <input type="submit" name="submit" value="add bill" class="btn">
        
                </form>
             
        </div>
        <div class="col-lg-5">
            <div class="cont">
                <h2>Order</h2>
                <div class="brdr"></div>
                <h5> Table 1</h5>
                <ul id="orderListTable1">
                    <!-- Orders for Table 1 will be dynamically added here -->
                </ul>
            
                <h5> Table 2</h5>
                <ul id="orderListTable2">
                    <!-- Orders for Table 2 will be dynamically added here -->
                </ul>
            </div>
        </div>
    </div>
   </div>

       <!-- ... (your HTML code) ... -->

      

        
    </div>

    <script src="restaurantapp.js"></script>
</body>
</html>
