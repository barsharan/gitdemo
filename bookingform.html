
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form </title>
    <style>
        body {
            background-image: url('https://cdn.pixabay.com/photo/2014/04/14/20/11/pink-324175_1280.jpg'); /* Replace with your background image path */
            background-size: cover;
            font-family: Arial, sans-serif;
        }
        .container {
            background-color: rgba(255, 255, 255, 0.7);
            max-width: 430px;
           
            margin:80px auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        .form-control{
            width:410px;
            padding:8px 10px;
            margin-bottom:20px;
            border-radius:15px;
            border:1px solid green;
        }
        .btn{
            background:green;
            color:#fff;
            border:1px solid green;
            border-radius:15px;
            padding: 8px 22px;
        }
        #userDetails {
            display: none;
        }
        #userDetails li{
            background:#fff;
            padding:10px;
            margin-bottom:10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Book An <span style="color: green;"> Appointment</span></h1>
        <form id="myForm" >
            <label for="name">Name:</label>
            <input type="text" id="nameInput" class="form-control" name="name" placeholder="Name" required>

            <label for="email">Email:</label>
            <input type="email" id="emailInput" name="email" class="form-control" placeholder="Email" required>

            <button type="submit" value="submit" class="btn">Submit</button>
        </form>
        <div id="userDetails">
            <h2>All User Details:</h2>
            <ul id="userList"></ul>
        </div>
    </div>
    

    <script src="dombooking.js">
      
    </script>
</body>
</html>
